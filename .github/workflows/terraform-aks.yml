name: AKS Infra + Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "k8s/**"
      - ".github/workflows/terraform-aks.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  infra:
    name: Provision AKS Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      rg:         ${{ steps.tf.outputs.RG }}
      aks:        ${{ steps.tf.outputs.AKS }}
      acr_name:   ${{ steps.tf.outputs.ACR_NAME }}
      acr_server: ${{ steps.tf.outputs.ACR_SERVER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show subscription
        run: az account show -o table

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Restore state from previous run so Terraform knows what already exists
      - name: Restore Terraform State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/
        continue-on-error: true

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # Import any Azure resources that exist but are not yet tracked in state.
      # Safe to run every time — already-tracked resources are silently skipped (|| true).
      - name: Import Existing Resources
        working-directory: terraform
        run: |
          SUB=$(az account show --query id -o tsv)
          RG="AZET-RG-Daas-Platform"

          echo "==> Importing network resources..."
          terraform import module.network.azurerm_virtual_network.vnet \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/virtualNetworks/ppowar-vnet" 2>/dev/null || true

          terraform import module.network.azurerm_subnet.aks \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/virtualNetworks/ppowar-vnet/subnets/ppowar-aks-subnet" 2>/dev/null || true

          terraform import module.network.azurerm_network_security_group.aks \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/networkSecurityGroups/ppowar-aks-nsg" 2>/dev/null || true

          terraform import module.network.azurerm_subnet_network_security_group_association.aks \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/virtualNetworks/ppowar-vnet/subnets/ppowar-aks-subnet" 2>/dev/null || true

          echo "==> Importing AKS cluster..."
          terraform import module.aks.azurerm_kubernetes_cluster.aks \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/ppowar-aks" 2>/dev/null || true

          echo "==> Importing user node pool..."
          terraform import 'module.user_node_pool.azurerm_kubernetes_cluster_node_pool.this' \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/ppowar-aks/agentPools/user" 2>/dev/null || true

          echo "==> Importing ACR..."
          terraform import module.acr.azurerm_container_registry.acr \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerRegistry/registries/ppowaracr" 2>/dev/null || true

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # Always save state so the next run can restore it
      - name: Save Terraform State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform/terraform.tfstate
          overwrite: true

      - name: Get Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "RG=$(terraform output -raw resource_group_name)"  >> $GITHUB_OUTPUT
          echo "AKS=$(terraform output -raw aks_name)"            >> $GITHUB_OUTPUT
          echo "ACR_NAME=$(terraform output -raw acr_name)"       >> $GITHUB_OUTPUT
          echo "ACR_SERVER=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap Cluster Tooling
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ needs.infra.outputs.rg }} \
            --name ${{ needs.infra.outputs.aks }} \
            --admin \
            --overwrite-existing

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Create ACR ImagePullSecret
        run: |
          ACR_PASSWORD=$(az acr credential show \
            --name ${{ needs.infra.outputs.acr_name }} \
            --query "passwords[0].value" -o tsv)

          for ns in default monitoring; do
            kubectl create secret docker-registry acr-pull-secret \
              --docker-server=${{ needs.infra.outputs.acr_server }} \
              --docker-username=${{ needs.infra.outputs.acr_name }} \
              --docker-password="$ACR_PASSWORD" \
              --namespace=$ns \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Apply resource limits to all namespaces
        run: |
          for ns in default monitoring ingress-nginx cert-manager; do
            kubectl apply -f k8s/limit-range.yaml -n $ns
          done

      - name: Add Helm repositories
        run: |
          helm repo add jetstack      https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Install cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --version v1.15.3 \
            --set crds.enabled=true \
            --wait \
            --timeout 5m

      - name: Install ingress-nginx
        run: |
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.replicaCount=2 \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz \
            --wait \
            --timeout 5m

      - name: Print cluster summary
        run: |
          echo "──────────────────────────────────────────"
          echo " AKS Cluster : ${{ needs.infra.outputs.aks }}"
          echo " ACR Server  : ${{ needs.infra.outputs.acr_server }}"
          echo "──────────────────────────────────────────"
          kubectl get nodes
          echo ""
          echo "Ingress External IP:"
          kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath="{.status.loadBalancer.ingress[0].ip}" || true
          echo ""
