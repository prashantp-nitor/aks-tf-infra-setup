name: AKS Infra + Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "k8s/**"
      - ".github/workflows/terraform-aks.yml"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  infra:
    name: Provision AKS Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      rg:  ${{ steps.tf.outputs.RG }}
      aks: ${{ steps.tf.outputs.AKS }}
      acr: ${{ steps.tf.outputs.ACR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Show subscription
        run: az account show -o table

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf
        working-directory: terraform
        run: |
          echo "RG=$(terraform output -raw resource_group_name)"  >> $GITHUB_OUTPUT
          echo "AKS=$(terraform output -raw aks_name)"            >> $GITHUB_OUTPUT
          echo "ACR=$(terraform output -raw acr_login_server)"    >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────────
  bootstrap:
    name: Bootstrap Cluster Tooling
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ needs.infra.outputs.rg }} \
            --name ${{ needs.infra.outputs.aks }} \
            --admin \
            --overwrite-existing

      - name: Verify cluster access
        run: kubectl get nodes -o wide

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Add Helm repositories
        run: |
          helm repo add jetstack      https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Install cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --version v1.15.3 \
            --set crds.enabled=true \
            --wait \
            --timeout 5m

      - name: Install ingress-nginx
        run: |
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.replicaCount=2 \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz \
            --wait \
            --timeout 5m

      - name: Print cluster summary
        run: |
          echo "──────────────────────────────────────────"
          echo " AKS Cluster : ${{ needs.infra.outputs.aks }}"
          echo " ACR Server  : ${{ needs.infra.outputs.acr }}"
          echo "──────────────────────────────────────────"
          kubectl get nodes
          echo ""
          echo "Ingress External IP:"
          kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath="{.status.loadBalancer.ingress[0].ip}" || true
          echo ""
